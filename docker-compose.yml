services:
  postgres:
    image: postgres:16
    container_name: finsight_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight_user
      POSTGRES_PASSWORD: finsight_password

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: finsight_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finsight.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    
    ports:
      - "5050:80"

    depends_on:
      - postgres
      
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: finsight_jupyter
    restart: unless-stopped

    ports:
      - "8888:8888"

    volumes:
      - ./:/home/jovyan/work

    environment:
      JUPYTER_ENABLE_LAB: "yes"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: finsight
      DB_USER: finsight_user
      DB_PASSWORD: finsight_password

    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data: